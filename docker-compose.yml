# Single-node OpenSearch for the POC.  Run:  docker compose up -d
# then:  python3 load_and_search.py   (connects to http://localhost:9200)
services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1   # or a newer 2.x / 3.x
    container_name: opensearch-poc
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true              # dev only — no TLS/auth, easy local testing
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
